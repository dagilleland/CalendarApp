<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workday Range Calendar</title>
    <meta
      name="description"
      content="A simple calendar for calculating inclusive workday ranges from dates, hours, and Canadian holidays."
    />
    <meta name="author" content="Dan Gilleland" />
    <meta name="author" content="Codex" />
    <link rel="canonical" href="https://gilleland.ca/CalendarApp/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Workday Range Calendar" />
    <meta
      property="og:description"
      content="Calculate inclusive workday ranges from dates, hours, and Canadian holidays."
    />
    <meta property="og:url" content="https://gilleland.ca/CalendarApp/" />
    <meta property="og:site_name" content="Workday Range Calendar" />
    <meta property="og:image" content="https://gilleland.ca/CalendarApp/social-preview.png" />
    <meta property="og:image:secure_url" content="https://gilleland.ca/CalendarApp/social-preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Workday Range Calendar preview" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Workday Range Calendar" />
    <meta
      name="twitter:description"
      content="Calculate inclusive workday ranges from dates, hours, and Canadian holidays."
    />
    <meta name="twitter:image" content="https://gilleland.ca/CalendarApp/social-preview.png" />
    <meta name="twitter:image:alt" content="Workday Range Calendar preview" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Inclusive workday calculator</p>
          <h1>Multi-month calendar</h1>
        </div>
        <div class="month-controls" aria-label="Calendar navigation">
          <button id="prevMonths" type="button" title="Previous four months" aria-label="Previous four months">‹</button>
          <button id="todayButton" type="button">Today</button>
          <button id="nextMonths" type="button" title="Next four months" aria-label="Next four months">›</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="control-panel" aria-label="Range controls">
          <section class="panel-section">
            <h2>Known date</h2>
            <div class="segmented" role="radiogroup" aria-label="Known date type">
              <label>
                <input type="radio" name="mode" value="start" />
                <span>Start</span>
              </label>
              <label>
                <input type="radio" name="mode" value="end" checked />
                <span>End</span>
              </label>
            </div>
          </section>

          <section class="panel-section">
            <h2>Range length</h2>
            <div class="segmented" role="radiogroup" aria-label="Range length input type">
              <label>
                <input type="radio" name="inputMode" value="days" />
                <span>Days</span>
              </label>
              <label>
                <input type="radio" name="inputMode" value="hours" checked />
                <span>Hours</span>
              </label>
            </div>

            <div id="daysFields" class="input-mode-fields" hidden>
              <label class="field-label" for="workdayCount">Work days</label>
              <input id="workdayCount" type="number" min="1" step="1" value="5" inputmode="numeric" />
            </div>

            <div id="hoursFields" class="input-mode-fields">
              <label class="field-label" for="hourCount">Hours</label>
              <input id="hourCount" type="number" min="0.01" step="0.25" value="36.25" inputmode="decimal" />

              <label class="field-label" for="hoursPerDay">Hours per day</label>
              <input id="hoursPerDay" type="number" min="0.01" step="0.25" value="7.25" inputmode="decimal" />
            </div>
          </section>

          <section class="result-panel" aria-live="polite">
            <span id="resultLabel">Select a workday to begin.</span>
            <strong id="resultDate">No range yet</strong>
            <p id="statusMessage" class="status-message"></p>
          </section>

          <section class="panel-section">
            <h2>Holidays</h2>
            <p class="holiday-note">Canadian federal statutory holidays are included automatically.</p>
            <form id="holidayForm" class="holiday-form">
              <label class="field-label" for="holidayDate">Exclude date</label>
              <div class="holiday-input-row">
                <input id="holidayDate" type="date" />
                <button type="submit">Add</button>
              </div>
            </form>
            <ul id="holidayList" class="holiday-list" aria-label="Saved holidays"></ul>
          </section>

          <section class="legend" aria-label="Calendar legend">
            <span><i class="legend-start"></i> Start</span>
            <span><i class="legend-end"></i> End</span>
            <span><i class="legend-range"></i> Range</span>
            <span><i class="legend-holiday"></i> Holiday</span>
          </section>
        </aside>

        <section class="calendar-area">
          <div id="calendarTitle" class="calendar-title" aria-live="polite"></div>
          <div id="calendarGrid" class="calendar-grid" aria-label="Four month calendar"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
